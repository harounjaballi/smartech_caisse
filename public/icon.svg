<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Icon Graphics: Cash Register / Bolt -->
  <g transform="translate(112, 112)" fill="white">
    <!-- Base -->
    <path d="M 40 220 L 248 220 L 248 248 L 40 248 Z" rx="8" />
    <path d="M 60 80 L 228 80 L 210 210 L 78 210 Z" />
    <!-- Screen -->
    <rect x="84" y="24" width="120" height="48" rx="8" fill="#e0e7ff" />
    <rect x="94" y="32" width="100" height="32" rx="4" fill="#1e1b4b" />
    <!-- Keys / Keypad -->
    <circle cx="100" cy="110" r="10" fill="#4f46e5" />
    <circle cx="130" cy="110" r="10" fill="#4f46e5" />
    <circle cx="160" cy="110" r="10" fill="#4f46e5" />
    <circle cx="190" cy="110" r="10" fill="#4f46e5" />

    <circle cx="100" cy="140" r="10" fill="#4f46e5" />
    <circle cx="130" cy="140" r="10" fill="#4f46e5" />
    <circle cx="160" cy="140" r="10" fill="#4f46e5" />
    <circle cx="190" cy="140" r="10" fill="#4f46e5" />

    <circle cx="100" cy="170" r="10" fill="#4f46e5" />
    <circle cx="130" cy="170" r="10" fill="#4f46e5" />
    <circle cx="160" cy="170" r="10" fill="#4f46e5" />
    <circle cx="190" cy="170" r="10" fill="#10b981" /> <!-- green check / active key -->
  </g>
</svg>
