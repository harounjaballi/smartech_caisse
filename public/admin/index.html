<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmarTech Admin — Gestion Utilisateurs</title>

<script type="module">
  import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { initializeAuth, browserLocalPersistence, signInWithEmailAndPassword, signOut, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  const firebaseConfig = {
    projectId:         "gen-lang-client-0254901931",
    appId:             "1:345747657785:web:ceaf34e8b90f4ac34e29e8",
    apiKey:            "AIzaSyCSzRg0qQZXXKK7GmENUwx9swnwR92naP4",
    authDomain:        "gen-lang-client-0254901931.firebaseapp.com",
    storageBucket:     "gen-lang-client-0254901931.firebasestorage.app",
    messagingSenderId: "345747657785",
  };

  const PROJECT_ID = "gen-lang-client-0254901931";
  const DB_ID      = "ai-studio-9c1ec554-4be5-4a4e-b0ab-1b80a7cd5acb";
  const ADMIN_EMAIL = "harounjaballi@gmail.com";

  const MENUS = [
    { id: 'dashboard', label: 'Tableau de bord' },
    { id: 'pos',       label: 'Vente (POS)' },
    { id: 'products',  label: 'Produits' },
    { id: 'clients',   label: 'Clients' },
    { id: 'sales',     label: 'Historique Ventes' },
    { id: 'invoices',  label: 'Facturation' },
    { id: 'notes',     label: 'Mémos & Notes' },
    { id: 'settings',  label: 'Paramètres' },
    { id: 'users',     label: 'Utilisateurs' },
  ];

  const app  = initializeApp(firebaseConfig);
  const auth = initializeAuth(app, { persistence: browserLocalPersistence });

  let idToken    = null;
  let currentUser = null;
  let allUsers   = [];
  let editingUid = null;

  const $    = id => document.getElementById(id);
  const show = id => $(id).classList.remove('hidden');
  const hide = id => $(id).classList.add('hidden');
  const toast = (msg, type='ok') => {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3500);
  };

  // ─── FIRESTORE REST API ─────────────────────────────────────────
  const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/${DB_ID}/documents`;

  async function firestoreGet(collection, pageSize = 200) {
    // Force fresh token
    const token = await auth.currentUser.getIdToken(true);
    console.log('[Admin] Token obtenu, longueur:', token.length);
    const res = await fetch(`${BASE}/${collection}?pageSize=${pageSize}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Firestore error');
    return (data.documents || []).map(docToObj);
  }

  async function firestorePatch(collection, docId, fields) {
    const token = await auth.currentUser.getIdToken(true);
    const body = { fields: objToFields(fields) };
    const fieldPaths = Object.keys(fields).map(k => `updateMask.fieldPaths=${encodeURIComponent(k)}`).join('&');
    const res = await fetch(`${BASE}/${collection}/${docId}?${fieldPaths}`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Firestore patch error');
    return data;
  }

  async function firestoreCreate(collection, docId, fields) {
    const token = await auth.currentUser.getIdToken(true);
    const body = { fields: objToFields(fields) };
    const res = await fetch(`${BASE}/${collection}/${docId}`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Firestore create error');
    return data;
  }

  async function firestoreDelete(collection, docId) {
    const token = await auth.currentUser.getIdToken(true);
    const res = await fetch(`${BASE}/${collection}/${docId}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error?.message || 'Firestore delete error');
    }
  }

  // Convertit un doc Firestore REST → objet JS
  function docToObj(doc) {
    const id = doc.name.split('/').pop();
    const obj = { uid: id };
    for (const [k, v] of Object.entries(doc.fields || {})) {
      obj[k] = parseValue(v);
    }
    return obj;
  }

  function parseValue(v) {
    if (v.stringValue  !== undefined) return v.stringValue;
    if (v.booleanValue !== undefined) return v.booleanValue;
    if (v.integerValue !== undefined) return parseInt(v.integerValue);
    if (v.doubleValue  !== undefined) return parseFloat(v.doubleValue);
    if (v.nullValue    !== undefined) return null;
    if (v.arrayValue)  return (v.arrayValue.values || []).map(parseValue);
    if (v.mapValue)    return Object.fromEntries(Object.entries(v.mapValue.fields || {}).map(([k,v2]) => [k, parseValue(v2)]));
    return null;
  }

  function objToFields(obj) {
    const fields = {};
    for (const [k, v] of Object.entries(obj)) {
      fields[k] = toFirestoreValue(v);
    }
    return fields;
  }

  function toFirestoreValue(v) {
    if (v === null || v === undefined) return { nullValue: null };
    if (typeof v === 'string')  return { stringValue: v };
    if (typeof v === 'boolean') return { booleanValue: v };
    if (typeof v === 'number')  return { integerValue: String(v) };
    if (Array.isArray(v))       return { arrayValue: { values: v.map(toFirestoreValue) } };
    if (typeof v === 'object')  return { mapValue: { fields: objToFields(v) } };
    return { stringValue: String(v) };
  }

  // ─── LOGIN ──────────────────────────────────────────────────────
  show('login-screen');
  hide('admin-screen');

  $('login-btn').addEventListener('click', async () => {
    const email = $('login-email').value.trim();
    const pwd   = $('login-pwd').value;
    if (!email || !pwd) return toast('Remplissez tous les champs.', 'err');
    if (email !== ADMIN_EMAIL) return toast('Accès réservé à l\'administrateur.', 'err');
    $('login-btn').textContent = 'Connexion…';
    $('login-btn').disabled = true;
    try {
      const cred = await signInWithEmailAndPassword(auth, email, pwd);
      currentUser = cred.user;
      $('admin-email-display').textContent = cred.user.email;
      hide('login-screen');
      show('admin-screen');
      await loadUsers();
    } catch(e) {
      let msg = 'Email ou mot de passe incorrect.';
      if (e.code === 'auth/too-many-requests')      msg = 'Trop de tentatives. Réessayez plus tard.';
      if (e.code === 'auth/network-request-failed') msg = 'Erreur réseau.';
      if (e.code === 'auth/unauthorized-domain')    msg = 'Domaine non autorisé dans Firebase.';
      console.error('[Login]', e.code, e.message);
      toast(msg, 'err');
      $('login-btn').textContent = 'Se connecter';
      $('login-btn').disabled = false;
    }
  });

  $('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); });

  $('logout-btn').addEventListener('click', async () => {
    await signOut(auth);
    currentUser = null;
    show('login-screen');
    hide('admin-screen');
  });

  // ─── LOAD USERS ─────────────────────────────────────────────────
  async function loadUsers() {
    $('table-body').innerHTML = `<tr><td colspan="6" class="loading-cell"><div class="spinner"></div></td></tr>`;
    try {
      // Attendre que le token soit bien disponible
      await new Promise(r => setTimeout(r, 500));
      allUsers = await firestoreGet('users');
      console.log('[Admin] Users chargés:', allUsers.length, allUsers.map(u => u.email));
      renderTable(allUsers);
      $('user-count').textContent = allUsers.length + ' utilisateur(s)';
    } catch(e) {
      console.error('[loadUsers]', e);
      toast('Erreur chargement : ' + e.message, 'err');
      $('table-body').innerHTML = `<tr><td colspan="6" class="empty-cell">Erreur : ${e.message}</td></tr>`;
    }
  }

  // ─── RENDER TABLE ───────────────────────────────────────────────
  function renderTable(users) {
    if (!users.length) {
      $('table-body').innerHTML = `<tr><td colspan="6" class="empty-cell">Aucun utilisateur trouvé.</td></tr>`;
      return;
    }
    const sorted = [...users].sort((a, b) => {
      if (a.email === ADMIN_EMAIL) return -1;
      if (b.email === ADMIN_EMAIL) return 1;
      return (a.name || a.email || '').localeCompare(b.name || b.email || '');
    });

    $('table-body').innerHTML = sorted.map(u => {
      const isSelf = u.email === ADMIN_EMAIL;
      const menus  = (u.allowedMenus || []).map(m => {
        const found = MENUS.find(x => x.id === m);
        return found ? `<span class="menu-tag">${found.label}</span>` : '';
      }).join('');
      const roleClass   = u.role === 'admin' ? 'badge-admin' : 'badge-user';
      const statusClass = u.status === 'banned' ? 'badge-banned' : 'badge-active';
      const statusLabel = u.status === 'banned' ? 'Banni' : 'Actif';
      const initial     = (u.name || u.email || '?')[0].toUpperCase();

      return `
      <tr class="${isSelf ? 'row-self' : ''}">
        <td>
          <div class="user-cell">
            <div class="avatar ${u.role === 'admin' ? 'avatar-admin' : ''}">${initial}</div>
            <div>
              <div class="user-name">${u.name || '—'} ${isSelf ? '<span class="you-badge">Vous</span>' : ''}</div>
              <div class="user-email">${u.email || '—'}</div>
              <div class="user-uid">UID: ${u.uid}</div>
            </div>
          </div>
        </td>
        <td><span class="badge ${roleClass}">${u.role === 'admin' ? 'Admin' : 'Caissier'}</span></td>
        <td><span class="badge ${statusClass}">${statusLabel}</span></td>
        <td class="menus-cell">${menus || '<span class="no-menus">Aucun</span>'}</td>
        <td>
          <div class="pass-cell">
            <span class="pass-dots" id="pass-${u.uid}">••••••••</span>
            <button class="icon-btn" onclick="togglePass('${u.uid}','${(u.password||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">👁</button>
            <button class="icon-btn" onclick="copyText('${(u.password||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">📋</button>
          </div>
        </td>
        <td>
          ${isSelf ? '<span class="badge badge-admin">Compte principal</span>' : `
          <div class="action-btns">
            <button class="btn btn-edit"   onclick="openEdit('${u.uid}')">✏️ Modifier</button>
            <button class="btn ${u.status==='banned'?'btn-activate':'btn-ban'}" onclick="toggleBan('${u.uid}','${u.status}','${u.email}')">
              ${u.status==='banned'?'✅ Activer':'🚫 Bloquer'}
            </button>
            <button class="btn btn-delete" onclick="confirmDelete('${u.uid}','${u.email}')">🗑</button>
          </div>`}
        </td>
      </tr>`;
    }).join('');
  }

  // ─── SEARCH ─────────────────────────────────────────────────────
  $('search-input').addEventListener('input', () => {
    const q = $('search-input').value.toLowerCase();
    renderTable(allUsers.filter(u =>
      (u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)
    ));
  });

  window.togglePass = (uid, pwd) => {
    const el = $('pass-' + uid);
    el.textContent = el.textContent === '••••••••' ? (pwd || 'Non défini') : '••••••••';
  };
  window.copyText = text => { navigator.clipboard.writeText(text); toast('Copié !'); };

  // ─── CREATE USER ────────────────────────────────────────────────
  $('open-create-btn').addEventListener('click', () => {
    editingUid = null;
    $('modal-title').textContent = 'Ajouter un utilisateur';
    $('form-name').value = '';
    $('form-email').value = '';
    $('form-pwd').value = '';
    $('form-role').value = 'user';
    $('form-status').value = 'active';
    document.querySelectorAll('.menu-checkbox').forEach(cb => {
      cb.checked = ['dashboard','pos','products','clients','sales','invoices'].includes(cb.value);
    });
    $('pwd-required').style.display = 'inline';
    $('modal-error').textContent = '';
    show('modal-overlay');
  });

  $('modal-close').addEventListener('click',  () => hide('modal-overlay'));
  $('modal-cancel').addEventListener('click', () => hide('modal-overlay'));

  $('form-role').addEventListener('change', () => {
    if ($('form-role').value === 'admin')
      document.querySelectorAll('.menu-checkbox').forEach(cb => cb.checked = true);
  });

  $('modal-save').addEventListener('click', async () => {
    const name   = $('form-name').value.trim();
    const email  = $('form-email').value.trim().toLowerCase();
    const pwd    = $('form-pwd').value;
    const role   = $('form-role').value;
    const status = $('form-status').value;
    const menus  = [...document.querySelectorAll('.menu-checkbox:checked')].map(c => c.value);

    $('modal-error').textContent = '';
    if (!name || name.length < 2)    return $('modal-error').textContent = 'Nom obligatoire (min 2 caractères).';
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return $('modal-error').textContent = 'Email invalide.';
    if (!editingUid && pwd.length < 6) return $('modal-error').textContent = 'Mot de passe : min 6 caractères.';
    if (!menus.length) return $('modal-error').textContent = 'Sélectionnez au moins un menu.';

    $('modal-save').textContent = 'Enregistrement…';
    $('modal-save').disabled = true;

    try {
      if (editingUid) {
        const updateData = { name, email, role, status, allowedMenus: menus };
        if (pwd.length >= 6) updateData.password = pwd;
        await firestorePatch('users', editingUid, updateData);
        toast(`✅ ${email} mis à jour.`);
      } else {
        // Créer Auth via app secondaire
        const tempApp  = (await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js')).initializeApp(firebaseConfig, 'temp_' + Date.now());
        const tempAuth = (await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js')).getAuth(tempApp);
        let newUid;
        try {
          const cred = await createUserWithEmailAndPassword(tempAuth, email, pwd);
          newUid = cred.user.uid;
          await tempAuth.signOut();
        } finally {
          await tempApp.delete().catch(()=>{});
        }
        const adminUid = currentUser.uid;
        await firestoreCreate('users', newUid, {
          uid: newUid, name, email, password: pwd, role, status,
          allowedMenus: menus,
          ownerId:   role === 'admin' ? newUid : adminUid,
          creatorId: adminUid,
        });
        toast(`✅ ${email} créé avec succès.`);
      }
      hide('modal-overlay');
      await loadUsers();
    } catch(e) {
      let msg = e.message;
      if (e.code === 'auth/email-already-in-use') msg = 'Cet email existe déjà dans Firebase Auth.';
      $('modal-error').textContent = msg;
    } finally {
      $('modal-save').textContent = 'Enregistrer';
      $('modal-save').disabled = false;
    }
  });

  window.openEdit = uid => {
    const u = allUsers.find(x => x.uid === uid);
    if (!u) return;
    editingUid = uid;
    $('modal-title').textContent = 'Modifier l\'utilisateur';
    $('form-name').value   = u.name  || '';
    $('form-email').value  = u.email || '';
    $('form-pwd').value    = '';
    $('form-role').value   = u.role   || 'user';
    $('form-status').value = u.status || 'active';
    $('pwd-required').style.display = 'none';
    document.querySelectorAll('.menu-checkbox').forEach(cb => {
      cb.checked = (u.allowedMenus || []).includes(cb.value);
    });
    $('modal-error').textContent = '';
    show('modal-overlay');
  };

  window.toggleBan = async (uid, currentStatus, email) => {
    const newStatus = currentStatus === 'banned' ? 'active' : 'banned';
    if (!confirm(`${newStatus === 'banned' ? 'Bloquer' : 'Activer'} ${email} ?`)) return;
    try {
      await firestorePatch('users', uid, { status: newStatus });
      toast(`✅ ${email} est maintenant ${newStatus === 'banned' ? 'bloqué' : 'actif'}.`);
      await loadUsers();
    } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  };

  window.confirmDelete = async (uid, email) => {
    if (!confirm(`⚠️ Supprimer définitivement ${email} ?`)) return;
    try {
      await firestoreDelete('users', uid);
      toast(`🗑 ${email} supprimé.`);
      await loadUsers();
    } catch(e) { toast('Erreur : ' + e.message, 'err'); }
  };

  $('refresh-btn').addEventListener('click', loadUsers);
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

/* LOGIN */
#login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#a855f7 100%); }

.login-logo h1 { font-size:26px; font-weight:900; background:linear-gradient(135deg,#4f46e5,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.login-logo p { font-size:11px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:2px; margin-top:4px; }

.login-card input:focus { border-color:#6366f1; }
#login-btn { width:100%; margin-top:24px; padding:14px; background:linear-gradient(135deg,#4f46e5,#7c3aed); color:white; border:none; border-radius:14px; font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1px; cursor:pointer; transition:opacity .2s; }
#login-btn:hover { opacity:.9; }
#login-btn:disabled { opacity:.6; cursor:not-allowed; }

/* ADMIN */
#admin-screen { display:flex; flex-direction:column; min-height:100vh; }
header { background:white; border-bottom:1px solid #e2e8f0; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.header-left { display:flex; align-items:center; gap:12px; }
.header-logo { font-size:18px; font-weight:900; background:linear-gradient(135deg,#4f46e5,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-sep { width:1px; height:20px; background:#e2e8f0; }
.header-title { font-size:13px; font-weight:700; color:#64748b; }
.header-right { display:flex; align-items:center; gap:12px; }
.admin-pill { display:flex; align-items:center; gap:8px; padding:6px 14px; background:#f0f4ff; border:1px solid #c7d2fe; border-radius:20px; font-size:12px; font-weight:600; color:#4f46e5; }
.admin-avatar { width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,#4f46e5,#a855f7); color:white; font-size:11px; font-weight:900; display:flex; align-items:center; justify-content:center; }
#logout-btn { padding:7px 16px; border:1.5px solid #fca5a5; background:#fff5f5; color:#ef4444; border-radius:10px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; transition:all .2s; }
#logout-btn:hover { background:#fee2e2; }

main { flex:1; padding:28px 32px; max-width:1400px; margin:0 auto; width:100%; }

/* TOOLBAR */
.toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.toolbar-left { display:flex; align-items:center; gap:12px; }
.page-title { font-size:22px; font-weight:900; color:#0f172a; letter-spacing:-.5px; }
#user-count { font-size:11px; font-weight:700; color:#94a3b8; background:#f8fafc; border:1px solid #e2e8f0; padding:4px 12px; border-radius:20px; }
.toolbar-right { display:flex; gap:10px; align-items:center; }
#search-input { padding:9px 16px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:13px; outline:none; width:220px; transition:border-color .2s; }
#search-input:focus { border-color:#6366f1; }
#refresh-btn { padding:9px 16px; background:white; border:1.5px solid #e2e8f0; border-radius:10px; font-size:13px; cursor:pointer; font-weight:600; transition:all .2s; }
#refresh-btn:hover { border-color:#6366f1; color:#6366f1; }
#open-create-btn { padding:10px 20px; background:linear-gradient(135deg,#4f46e5,#7c3aed); color:white; border:none; border-radius:12px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; box-shadow:0 4px 12px rgba(79,70,229,.3); transition:opacity .2s; }
#open-create-btn:hover { opacity:.9; }

/* TABLE */
.table-card { background:white; border-radius:20px; border:1px solid #e2e8f0; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.04); }
table { width:100%; border-collapse:collapse; }
thead tr { background:#f8fafc; border-bottom:1px solid #e2e8f0; }
th { padding:14px 20px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:#94a3b8; text-align:left; white-space:nowrap; }
td { padding:16px 20px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background:#fafafa; }
tr.row-self { background:#f5f3ff !important; border-left:3px solid #6366f1; }
tr.row-self td:first-child { padding-left:17px; }
.loading-cell,.empty-cell { text-align:center; padding:60px 20px; color:#94a3b8; font-size:14px; font-weight:600; }
.spinner { width:32px; height:32px; border:3px solid #e2e8f0; border-top-color:#6366f1; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* USER CELL */
.user-cell { display:flex; align-items:center; gap:12px; }
.avatar { width:38px; height:38px; border-radius:12px; background:#ede9fe; color:#6366f1; font-size:14px; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.avatar-admin { background:#fae8ff; color:#a855f7; }
.user-name { font-size:13px; font-weight:700; color:#0f172a; display:flex; align-items:center; gap:6px; }
.user-email { font-size:11px; color:#64748b; margin-top:2px; }
.user-uid { font-size:9px; color:#cbd5e1; font-family:monospace; margin-top:2px; }
.you-badge { font-size:9px; font-weight:800; text-transform:uppercase; background:#ede9fe; color:#6366f1; padding:2px 7px; border-radius:6px; border:1px solid #c4b5fd; }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:8px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
.badge-admin  { background:#fae8ff; color:#a855f7; border:1px solid #e9d5ff; }
.badge-user   { background:#eff6ff; color:#3b82f6; border:1px solid #bfdbfe; }
.badge-active { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
.badge-banned { background:#fff1f2; color:#e11d48; border:1px solid #fecdd3; }

/* MENUS */
.menus-cell { max-width:260px; }
.menu-tag { display:inline-block; font-size:9px; font-weight:700; background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; padding:2px 7px; border-radius:5px; margin:2px; }
.no-menus { font-size:11px; color:#cbd5e1; font-style:italic; }

/* PASSWORD */
.pass-cell { display:flex; align-items:center; gap:6px; }
.pass-dots { font-family:monospace; font-size:12px; color:#475569; }
.icon-btn { background:none; border:none; cursor:pointer; font-size:14px; padding:3px 5px; border-radius:6px; transition:background .15s; }
.icon-btn:hover { background:#f1f5f9; }

/* ACTIONS */
.action-btns { display:flex; gap:6px; flex-wrap:wrap; }
.btn { padding:6px 12px; border-radius:9px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; border:1.5px solid transparent; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn-edit     { background:#f8fafc; border-color:#e2e8f0; color:#475569; }
.btn-edit:hover { border-color:#6366f1; color:#6366f1; background:#ede9fe; }
.btn-ban      { background:#fff1f2; border-color:#fecdd3; color:#e11d48; }
.btn-ban:hover { background:#ffe4e6; }
.btn-activate { background:#f0fdf4; border-color:#bbf7d0; color:#16a34a; }
.btn-activate:hover { background:#dcfce7; }
.btn-delete   { background:white; border-color:#e2e8f0; color:#94a3b8; font-size:14px; padding:5px 9px; }
.btn-delete:hover { background:#fff1f2; border-color:#fecdd3; color:#e11d48; }

/* MODAL */
#modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal { background:white; border-radius:24px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,.2); }
.modal-header { padding:24px 28px 20px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:white; z-index:1; border-radius:24px 24px 0 0; }
#modal-title { font-size:16px; font-weight:900; color:#0f172a; }
#modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:#94a3b8; padding:4px; border-radius:8px; transition:all .15s; }
#modal-close:hover { background:#f1f5f9; color:#475569; }
.modal-body { padding:24px 28px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#64748b; margin-bottom:6px; }
.field input,.field select { width:100%; padding:10px 14px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:13px; outline:none; transition:border-color .2s; color:#1e293b; }
.field input:focus,.field select:focus { border-color:#6366f1; }
.menus-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
.menu-check-item { display:flex; align-items:center; gap:8px; padding:9px 12px; border:1.5px solid #e2e8f0; border-radius:10px; cursor:pointer; transition:all .15s; font-size:12px; font-weight:600; color:#475569; user-select:none; }
.menu-check-item:has(input:checked) { background:#ede9fe; border-color:#a5b4fc; color:#4338ca; }
.menu-check-item input { width:14px; height:14px; accent-color:#6366f1; cursor:pointer; }
#modal-error { color:#e11d48; font-size:12px; font-weight:600; margin-bottom:12px; padding:10px 14px; background:#fff1f2; border-radius:10px; border:1px solid #fecdd3; }
#modal-error:empty { display:none; }
.modal-footer { padding:16px 28px 24px; display:flex; gap:10px; border-top:1px solid #f1f5f9; }
#modal-cancel { flex:1; padding:12px; background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:12px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; color:#64748b; }
#modal-cancel:hover { background:#f1f5f9; }
#modal-save { flex:2; padding:12px; background:linear-gradient(135deg,#4f46e5,#7c3aed); color:white; border:none; border-radius:12px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; box-shadow:0 4px 12px rgba(79,70,229,.3); }
#modal-save:hover { opacity:.9; }
#modal-save:disabled { opacity:.6; cursor:not-allowed; }

/* TOAST */
.toast { position:fixed; bottom:28px; right:28px; padding:14px 20px; border-radius:14px; font-size:13px; font-weight:700; box-shadow:0 8px 30px rgba(0,0,0,.15); transform:translateY(20px); opacity:0; transition:all .3s; z-index:999; max-width:360px; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok  { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
.toast.err { background:#fff1f2; color:#e11d48; border:1px solid #fecdd3; }
.hidden { display:none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>🛒 SmarTech</h1>
      <p>Panneau Administrateur</p>
    </div>
    <label>Adresse email</label>
    <input type="email" id="login-email" value="harounjaballi@gmail.com" />
    <label>Mot de passe</label>
    <input type="password" id="login-pwd" placeholder="••••••••" />
    <button id="login-btn">Se connecter</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen" class="hidden">
  <header>
    <div class="header-left">
      <span class="header-logo">SmarTech</span>
      <div class="header-sep"></div>
      <span class="header-title">Panneau Admin</span>
    </div>
    <div class="header-right">
      <div class="admin-pill">
        <div class="admin-avatar">H</div>
        <span id="admin-email-display"></span>
      </div>
      <button id="logout-btn">Déconnexion</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="toolbar-left">
        <h1 class="page-title">Gestion des Utilisateurs</h1>
        <span id="user-count">—</span>
      </div>
      <div class="toolbar-right">
        <input type="text" id="search-input" placeholder="🔍 Rechercher…" />
        <button id="refresh-btn">🔄 Rafraîchir</button>
        <button id="open-create-btn">+ Ajouter un utilisateur</button>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Utilisateur</th>
            <th>Rôle</th>
            <th>Statut</th>
            <th>Menus autorisés</th>
            <th>Mot de passe</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" class="loading-cell"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title">Ajouter un utilisateur</span>
      <button id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <span id="modal-error"></span>
      <div class="field">
        <label>Nom complet</label>
        <input type="text" id="form-name" placeholder="Ex : Jean Dupont" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="form-email" placeholder="caissier@exemple.com" />
      </div>
      <div class="field">
        <label>Mot de passe <span id="pwd-required" style="color:#e11d48">*</span> <small style="font-weight:500;text-transform:none;letter-spacing:0;color:#94a3b8">(laisser vide pour ne pas changer)</small></label>
        <input type="text" id="form-pwd" placeholder="Min. 6 caractères" />
      </div>
      <div class="field">
        <label>Rôle</label>
        <select id="form-role">
          <option value="user">Caissier / Vendeur</option>
          <option value="admin">Administrateur</option>
        </select>
      </div>
      <div class="field">
        <label>Statut</label>
        <select id="form-status">
          <option value="active">Actif</option>
          <option value="banned">Bloqué</option>
        </select>
      </div>
      <div class="field">
        <label>Menus autorisés</label>
        <div class="menus-grid">
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="dashboard" /> Tableau de bord</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="pos" /> Vente (POS)</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="products" /> Produits</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="clients" /> Clients</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="sales" /> Historique Ventes</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="invoices" /> Facturation</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="notes" /> Mémos & Notes</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="settings" /> Paramètres</label>
          <label class="menu-check-item"><input type="checkbox" class="menu-checkbox" value="users" /> Utilisateurs</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="modal-cancel">Annuler</button>
      <button id="modal-save">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
